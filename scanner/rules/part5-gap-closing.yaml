# Part 5 Gap-Closing Rules
# Based on GCTF-2024, OnlyPwner, and Faillapop gap analysis
# Created: 2026-01-08
rules:

  # ============================================
  # GCTF-2024 GAPS - ITERATION 2 (Pattern-Matched)
  # ============================================

  # TimeLock: lockTime += _secondsToIncrease (public unchecked increment)
  # Using pattern-regex for reliable matching
  - id: sol-timelock-increment-overflow
    message: "Public function increments lockTime without bounds - can overflow to bypass timelock (GCTF-2024 TimeLock)"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-190: Integer Overflow"
      source: "GCTF-2024 TimeLock"
      exploit: "User passes MAX_UINT to overflow lockTime, making it smaller than block.timestamp"
    pattern-regex: 'lockTime\s*\+=\s*\w+'

  # TheClassis: State zeroed after call - classic reentrancy
  - id: sol-reentrancy-balance-zero
    message: "Balance set to zero - verify this happens BEFORE external calls to prevent reentrancy (GCTF-2024 TheClassis)"
    languages: [solidity]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-841: Improper Enforcement of Behavioral Workflow"
      source: "GCTF-2024 TheClassis"
    pattern-regex: 'balances\s*\[\s*msg\.sender\s*\]\s*=\s*0'

  # Token_Bonanza: require(msg.sender != owner) - INVERTED check
  - id: sol-access-control-inverted-check
    message: "Access control uses != instead of == - anyone EXCEPT owner can call (GCTF-2024 FaultyTokenOwner)"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-863: Incorrect Authorization"
      source: "GCTF-2024 Token_Bonanza FaultyTokenOwner"
      exploit: "Modifier checks msg.sender != owner, so non-owners can mint tokens"
    pattern-regex: 'require\s*\(\s*msg\.sender\s*!=\s*owner'

  - id: sol-timelock-overflow-bypass
    message: "Timelock duration added to block.timestamp may overflow - attacker can bypass waiting period"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-190: Integer Overflow"
      source: "GCTF-2024 Timelock challenge"
      exploit: "Attacker sets extremely large duration that overflows, resulting in unlock time in the past"
    patterns:
      - pattern-either:
          - pattern: |
              unlockTime = block.timestamp + $DURATION
          - pattern: |
              $LOCK.timestamp = block.timestamp + $PERIOD
          - pattern: |
              lockEnd = block.timestamp + $DELAY
      - pattern-not-inside: |
          require($DURATION <= $MAX_DURATION, ...);
          ...
      - pattern-not-inside: |
          if ($DURATION > $MAX) revert ...;
          ...

  - id: sol-timelock-user-controlled-duration
    message: "User-controlled timelock duration without bounds check - can set to 0 or overflow value"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      source: "GCTF-2024 Timelock"
    patterns:
      - pattern-inside: |
          function $LOCK(..., uint256 $DURATION, ...) {
            ...
          }
      - pattern: |
          $VAR = block.timestamp + $DURATION
      - pattern-not-inside: |
          require($DURATION >= $MIN_DURATION, ...);
          ...
      - pattern-not-inside: |
          require($DURATION > 0, ...);
          ...

  - id: sol-owner-only-bypass-init
    message: "onlyOwner modifier but owner can be set via unprotected initializer"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-284: Improper Access Control"
      source: "GCTF-2024 TokenBonanza challenge"
    patterns:
      - pattern-inside: |
          contract $CONTRACT {
            ...
            address public owner;
            ...
            modifier onlyOwner() {
              require(msg.sender == owner, ...);
              _;
            }
            ...
          }
      - pattern: |
          function $INIT(...) public {
            owner = $ADDR;
            ...
          }
      - pattern-not-inside: |
          function $INIT(...) public initializer {
            ...
          }

  - id: sol-owner-reassignment-no-check
    message: "Owner can be reassigned without checking current ownership - front-running risk"
    languages: [solidity]
    severity: WARNING
    metadata:
      category: security
      source: "GCTF-2024 TokenBonanza"
    patterns:
      - pattern: |
          function setOwner(address $NEW) {
            owner = $NEW;
          }
      - pattern-not-inside: |
          require(msg.sender == owner, ...);
          ...

  - id: sol-classic-reentrancy-cei-violation
    message: "State change after external call - classic CEI violation, reentrancy possible"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-841: Improper Enforcement of Behavioral Workflow"
      source: "GCTF-2024 TheClassis challenge"
      exploit: "Checks-Effects-Interactions pattern violation"
    patterns:
      - pattern-either:
          # Direct ETH transfer before state update
          - pattern: |
              (bool $OK, ) = $TO.call{value: $AMT}("");
              ...
              balances[$USER] -= $AMT
          # payable.transfer before state update
          - pattern: |
              payable($TO).transfer($AMT);
              ...
              balances[$USER] -= $AMT
          # ERC20 transfer before state update
          - pattern: |
              $TOKEN.transfer($TO, $AMT);
              ...
              $MAPPING[$USER] -= $AMT

  - id: sol-withdraw-reentrancy-no-guard
    message: "Withdraw function with external call but no reentrancy guard or CEI pattern"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      source: "GCTF-2024 TheClassis"
    patterns:
      - pattern-inside: |
          function withdraw(...) {
            ...
          }
      - pattern: |
          (bool $SUCCESS, ) = msg.sender.call{value: ...}("")
      - pattern-not-inside: |
          nonReentrant
      - pattern-not-inside: |
          require(!locked, ...);
          locked = true;
          ...

  # ============================================
  # ONLYPWNER GAPS - ITERATION 2 (pattern-regex)
  # ============================================

  # bobface-reverse-rugpull: Owner gets 2x payout (hidden privilege)
  - id: sol-owner-hidden-multiplier
    message: "Owner gets multiplied payout - hidden rugpull privilege (OnlyPwner reverse-rugpull)"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-284: Improper Access Control"
      source: "OnlyPwner bobface-reverse-rugpull"
      exploit: "Owner can withdraw 2x their share, draining vault"
    pattern-regex: 'if\s*\(\s*msg\.sender\s*==\s*owner\s*\)[\s\S]*?\*=\s*2'

  # bobface-please-sign-here: Arbitrary storage slot write via assembly
  - id: sol-arbitrary-storage-slot-assembly
    message: "Assembly writes to storage slot derived from user input - arbitrary storage write (OnlyPwner please-sign-here)"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-787: Out-of-bounds Write"
      source: "OnlyPwner bobface-please-sign-here"
      exploit: "Attacker can overwrite arbitrary storage by controlling signer address"
    pattern-regex: 'assembly\s*\{[\s\S]*?\.slot\s*:='

  # bobface-diversion: Public yield function allows MEV sandwich
  - id: sol-public-yield-accumulate
    message: "Public yield accumulation function - MEV/JIT attack vector (OnlyPwner diversion)"
    languages: [solidity]
    severity: WARNING
    metadata:
      category: security
      source: "OnlyPwner bobface-diversion"
      exploit: "Whale can sandwich deposit around yield distribution"
    pattern-regex: 'function\s+accumulateYield[^)]*\)\s*(external|public)'

  - id: sol-mev-yield-extraction-whale
    message: "Yield distribution susceptible to whale MEV extraction - no caps or time-weighted distribution"
    languages: [solidity]
    severity: WARNING
    metadata:
      category: security
      source: "OnlyPwner bobface-diversion challenge"
      exploit: "Whale can sandwich deposit/withdraw around yield distribution"
    patterns:
      - pattern-inside: |
          function distributeYield(...) {
            ...
          }
      - pattern: |
          for (...) {
            ...
            rewards[$USER] = $BALANCE * $RATE / $TOTAL
            ...
          }
      - pattern-not-inside: |
          require(block.timestamp >= lastDistribution + $MIN_INTERVAL, ...);
          ...

  - id: sol-jit-liquidity-vulnerable
    message: "Liquidity provision without time lock - vulnerable to JIT (just-in-time) attacks"
    languages: [solidity]
    severity: INFO
    metadata:
      category: security
      source: "OnlyPwner diversion"
    patterns:
      - pattern-inside: |
          function addLiquidity(...) {
            ...
          }
      - pattern-not-inside: |
          require(block.timestamp >= deposits[$USER] + $LOCK_TIME, ...);
          ...

  - id: sol-rugpull-owner-drain
    message: "Owner can drain all funds without timelock - rugpull risk"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      source: "OnlyPwner bobface-reverse-rugpull challenge"
    patterns:
      - pattern-inside: |
          function $FUNC(...) ... onlyOwner ... {
            ...
          }
      - pattern-either:
          - pattern: |
              $TOKEN.transfer(owner, $TOKEN.balanceOf(address(this)))
          - pattern: |
              payable(owner).transfer(address(this).balance)
          - pattern: |
              (bool $OK, ) = owner.call{value: address(this).balance}("")

  - id: sol-rugpull-defense-backfire
    message: "Rugpull defense mechanism may backfire on attacker - verify logic"
    languages: [solidity]
    severity: INFO
    metadata:
      category: security
      source: "OnlyPwner reverse-rugpull"
    patterns:
      - pattern-inside: |
          function emergencyWithdraw(...) {
            ...
          }
      - pattern: |
          require(msg.sender == owner, ...)
      - pattern-inside: |
          $TOKEN.transferFrom(owner, ...)

  - id: sol-multisig-signer-enumeration
    message: "Multisig signers can be enumerated via public mapping - privacy concern"
    languages: [solidity]
    severity: INFO
    metadata:
      category: security
      source: "OnlyPwner multisig"
    pattern: |
      mapping(address => bool) public isSigner

  - id: sol-multisig-replay-tx-hash
    message: "Multisig transaction hash doesn't include nonce - replay attack possible"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      source: "OnlyPwner multisig"
    patterns:
      - pattern: |
          bytes32 $HASH = keccak256(abi.encode($TO, $VALUE, $DATA))
      - pattern-not-inside: |
          bytes32 $HASH = keccak256(abi.encode($TO, $VALUE, $DATA, nonce))

  - id: sol-shapeshifter-metamorphic
    message: "Contract uses CREATE2 with selfdestruct - can be metamorphic (code changes after deploy)"
    languages: [solidity]
    severity: WARNING
    metadata:
      category: security
      source: "OnlyPwner shapeshifter"
      exploit: "Metamorphic contract attack"
    patterns:
      - pattern-inside: |
          contract $NAME {
            ...
            function $DEPLOY(...) {
              ...
            }
            ...
          }
      - pattern: |
          $NEW = create2($SALT, ...)
      - pattern-inside: |
          selfdestruct(...)

  - id: sol-protection-bypass-gasleft
    message: "Protection uses gasleft() which can be manipulated by caller"
    languages: [solidity]
    severity: WARNING
    metadata:
      category: security
      source: "OnlyPwner shapeshifter"
    patterns:
      - pattern: |
          require(gasleft() > $THRESHOLD, ...)
      - pattern-not-inside: |
          require(gasleft() > $THRESHOLD && gasleft() < $MAX, ...);
          ...

  - id: sol-voting-state-manipulation
    message: "Vote can be finalized before intended deadline via state manipulation"
    languages: [solidity]
    severity: WARNING
    metadata:
      category: security
      source: "OnlyPwner please-sign-here"
    patterns:
      - pattern-inside: |
          function finalize(...) {
            ...
          }
      - pattern: |
          require(votes >= threshold, ...)
      - pattern-not-inside: |
          require(block.timestamp >= deadline, ...);
          ...

  # ============================================
  # ADDITIONAL PATTERNS FROM PART 5 ANALYSIS
  # ============================================

  - id: sol-hidden-fee-deceptive
    message: "Fee not clearly documented or visible in function signature - deceptive pattern"
    languages: [solidity]
    severity: WARNING
    metadata:
      category: security
      source: "OnlyPwner liquid-staking"
    patterns:
      - pattern-inside: |
          function deposit(...) {
            ...
          }
      - pattern: |
          uint256 $FEE = $AMOUNT * $RATE / $DENOM
      - pattern-not-inside: |
          /// @param $FEE_PARAM ...
          function deposit(..., uint256 $FEE_PARAM, ...) {
            ...
          }

  - id: sol-modifier-missing-underscore-critical
    message: "Modifier without underscore (_) - function body NEVER executes, critical bug"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      source: "Faillapop analysis - 14 detections"
      cwe: "CWE-670: Always-Incorrect Control Flow Implementation"
    patterns:
      - pattern-regex: 'modifier\s+\w+\s*\([^)]*\)\s*\{[^}]*\}(?!\s*_)'
      - pattern-not-regex: '_\s*;'

  - id: sol-dao-voting-without-snapshot
    message: "DAO voting without balance snapshot - flash loan governance attack possible"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      source: "Faillapop DAO analysis"
    patterns:
      - pattern-inside: |
          function vote(...) {
            ...
          }
      - pattern: |
          uint256 $POWER = $TOKEN.balanceOf(msg.sender)
      - pattern-not-inside: |
          uint256 $POWER = $TOKEN.getPastVotes(msg.sender, $SNAPSHOT)

  - id: sol-marketplace-escrow-no-timeout
    message: "Marketplace escrow without timeout - funds can be locked indefinitely"
    languages: [solidity]
    severity: WARNING
    metadata:
      category: security
      source: "Faillapop marketplace"
    patterns:
      - pattern-inside: |
          function createEscrow(...) {
            ...
          }
      - pattern: |
          escrows[$ID] = Escrow({...})
      - pattern-not-inside: |
          escrows[$ID] = Escrow({..., deadline: block.timestamp + $PERIOD, ...})

  - id: sol-dispute-centralized-resolution
    message: "Dispute resolution controlled by single admin - centralization risk"
    languages: [solidity]
    severity: WARNING
    metadata:
      category: security
      source: "Faillapop DAO disputes"
    patterns:
      - pattern-inside: |
          function resolveDispute(...) ... onlyOwner ... {
            ...
          }
      - pattern-not-inside: |
          function resolveDispute(...) ... onlyDAO ... {
            ...
          }

  # ============================================
  # TRAIL OF BITS CTF GAPS (grehack-2017)
  # ============================================

  # Bank.sol: Old Solidity 0.4 reentrancy pattern with call.value()
  - id: sol-call-value-reentrancy-legacy
    message: "Legacy .call.value()() used for ETH transfer - verify CEI pattern to prevent reentrancy (Trail of Bits Bank)"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-841: Improper Enforcement of Behavioral Workflow"
      source: "Trail of Bits CTF grehack-2017 Bank"
      exploit: "call.value() triggers fallback, balance update happens after, reentrancy possible"
    pattern-regex: '\.call\.value\s*\([^)]*\)\s*\(\s*\)'

  - id: sol-call-value-before-state-update
    message: "ETH sent via call.value() before balance decrement - classic reentrancy (Trail of Bits Bank)"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-841: Improper Enforcement of Behavioral Workflow"
      source: "Trail of Bits CTF grehack-2017 Bank"
    patterns:
      - pattern: |
          msg.sender.call.value($AMT)()
      - pattern-not-inside: |
          $BALANCE[$USER] -= $AMT;
          ...
          msg.sender.call.value($AMT)()

  # Bounty.sol: Wrong variable bug - rewards[msg.sender] instead of rewards[chall]
  - id: sol-wrong-mapping-key-param-vs-sender
    message: "Reading rewards[msg.sender] but function has address parameter - likely wrong variable (Trail of Bits Bounty)"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-480: Use of Incorrect Operator"
      source: "Trail of Bits CTF grehack-2017 Bounty"
      exploit: "Solver gets 0 reward because rewards[msg.sender] is empty, should use rewards[chall]"
    patterns:
      - pattern-inside: |
          function $FUNC(address $PARAM, ...) {
            ...
          }
      - pattern: |
          $MAPPING[msg.sender]
      - metavariable-regex:
          metavariable: $FUNC
          regex: '(bounty|solve|claim|redeem)'

  - id: sol-reward-from-wrong-address
    message: "Reward calculated from msg.sender's balance when param address intended - wrong variable bug"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      source: "Trail of Bits CTF grehack-2017 Bounty.sol:67"
      exploit: "rewards[msg.sender] is 0, should be rewards[chall]"
    pattern-regex: 'uint\s+reward\s*=\s*rewards\s*\[\s*msg\.sender\s*\]'

  # GreHackCoin.sol: Backwards initialization check
  - id: sol-init-backwards-zero-check
    message: "Initialization check uses != 0 - allows re-init when already set (Trail of Bits GreHackCoin)"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-284: Improper Access Control"
      source: "Trail of Bits CTF grehack-2017 GreHackCoin"
      exploit: "if(address(x)!=0x0) allows overwrite when x is set, should be ==0x0"
    pattern-regex: 'if\s*\(\s*address\s*\([^)]+\)\s*!=\s*(0x0|0|address\(0\))\s*\)'

  - id: sol-owner-contract-overwritable
    message: "Owner contract can be overwritten via initOwner - access control bypass (Trail of Bits GreHackCoin)"
    languages: [solidity]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-284: Improper Access Control"
      source: "Trail of Bits CTF grehack-2017 GreHackCoin"
    patterns:
      - pattern: |
          function initOwner(address $C) {
            ...
            $OWNER = $TYPE($C);
            ...
          }
      - pattern-not-inside: |
          function initOwner(address $C) ... onlyOwner ... {
            ...
          }
      - pattern-not-inside: |
          require(address($OWNER) == address(0), ...);
          ...

  # Casino.sol: Weak randomness / frontrunning
  - id: sol-owner-controlled-randomness
    message: "Owner sets 'random' number via sendNumber - not random, can be front-run (Trail of Bits Casino)"
    languages: [solidity]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-330: Use of Insufficiently Random Values"
      source: "Trail of Bits CTF grehack-2017 Casino"
    patterns:
      - pattern: |
          function sendNumber($TYPE $RANDOM, ...) ... {
            require(msg.sender == owner, ...);
            ...
            $MAPPING[$ADDR] = $RANDOM;
            ...
          }

  - id: sol-guess-game-frontrun
    message: "Guess game with owner-set number is frontrunnable - anyone can see sendNumber tx"
    languages: [solidity]
    severity: WARNING
    metadata:
      category: security
      source: "Trail of Bits CTF grehack-2017 Casino"
    pattern-regex: 'function\s+guessNumber\s*\('

  # Variable shadowing (GreHackCoin has owner in both Owner and FuturOwner)
  - id: sol-variable-shadowing-owner
    message: "Variable 'owner' shadows parent contract's owner - can cause confusion"
    languages: [solidity]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-710: Improper Adherence to Coding Standards"
      source: "Trail of Bits CTF grehack-2017 GreHackCoin"
    patterns:
      - pattern-inside: |
          contract $CHILD is $PARENT {
            address owner;
            ...
          }
      - metavariable-regex:
          metavariable: $PARENT
          regex: '(Owner|Ownable|Owned)'

